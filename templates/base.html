<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tirana{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #f5f5f5;
            color: #333;
        }
        h1 { color: #1a1a2e; }
        button {
            background: #16213e;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #0f3460; }
        #greeting {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 4px;
            min-height: 2rem;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
